# Include from Apache vhost or enable via: sudo a2enconf darulquran-security
# Requires: sudo a2enmod headers

# Security headers (edge layer — supplements Next.js headers)
Header always set X-Content-Type-Options "nosniff"
Header always set X-Frame-Options "SAMEORIGIN"
Header always set Referrer-Policy "strict-origin-when-cross-origin"
Header always set Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()"

# HSTS — only effective over HTTPS; safe to set on :443 vhosts
Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" "expr=%{HTTPS} == 'on'"

# Immutable cache for Next.js static assets
<LocationMatch "^/_next/static/">
    Header set Cache-Control "public, max-age=31536000, immutable"
</LocationMatch>
