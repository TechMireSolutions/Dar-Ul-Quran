# Next.js immutable assets — include from SSL vhost (see apply-apache-static.sh)
# Requires: a2enmod alias headers mime proxy

Alias /_next/static/ /var/www/darulquran_next/.next/static/

<Directory /var/www/darulquran_next/.next/static>
    Options -Indexes
    AllowOverride None
    Require all granted

    <IfModule mod_mime.c>
        AddType application/javascript .js
        AddType application/javascript .mjs
        AddType text/css .css
        AddType font/woff2 .woff2
    </IfModule>

    Header set Cache-Control "public, max-age=31536000, immutable"
</Directory>
