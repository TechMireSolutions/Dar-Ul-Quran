name: Deploy Darulquran Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hetzner VPS via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            set -e
            echo "=== Dar Ul Quran deploy script v7 $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="
            cd /var/www/darulquran_next

            git checkout -- . 2>/dev/null || true
            git fetch origin main
            git reset --hard origin/main
            echo "HEAD: $(git rev-parse --short HEAD)"

            if [ -f .env ]; then set -a && . ./.env && set +a; fi
            if [ -f .env.local ]; then set -a && . ./.env.local && set +a; fi
            unset NODE_ENV

            if [ -s "$HOME/.nvm/nvm.sh" ]; then
              . "$HOME/.nvm/nvm.sh"
              nvm use 22 2>/dev/null || nvm use node 2>/dev/null || true
            fi
            echo "Node: $(node -v)"

            # Stop app BEFORE touching .next — prevents 500s on /_next/static/chunks during rebuild.
            pm2 stop darulquran-next 2>/dev/null || true

            rm -rf node_modules
            npm ci --include=dev
            npm run build

            if [ ! -f .next/BUILD_ID ]; then
              echo "ERROR: Build output missing (.next/BUILD_ID not found)"
              exit 1
            fi

            SAMPLE_CHUNK=$(find .next/static/chunks -maxdepth 1 -name '*.js' -type f | head -1)
            if [ -z "$SAMPLE_CHUNK" ]; then
              echo "ERROR: No JS chunks in .next/static/chunks"
              exit 1
            fi
            echo "Build chunks OK: $(basename "$SAMPLE_CHUNK")"

            pm2 delete darulquran-next 2>/dev/null || true
            pm2 start ecosystem.config.cjs --update-env
            pm2 save

            CHUNK_URL_PATH="/_next/static/chunks/$(basename "$SAMPLE_CHUNK")"
            for i in 1 2 3 4 5 6; do
              if curl -fsS "http://127.0.0.1:3001/" -o /dev/null \
                && curl -fsS "http://127.0.0.1:3001${CHUNK_URL_PATH}" -o /dev/null; then
                echo "Health check passed: homepage + ${CHUNK_URL_PATH}"
                break
              fi
              if [ "$i" -eq 6 ]; then
                echo "ERROR: App or static chunks not responding on http://127.0.0.1:3001"
                pm2 logs darulquran-next --lines 40 --nostream || true
                exit 1
              fi
              echo "Waiting for app to start (attempt $i/6)..."
              sleep 5
            done

            if [ -d /etc/apache2 ] && command -v apache2ctl >/dev/null 2>&1; then
              echo "Applying Apache security headers..."
              sudo bash deploy/apply-apache-security.sh || echo "WARN: Apache security snippet skipped."
              echo "Configuring Apache static asset serving..."
              sudo bash deploy/apply-apache-static.sh || echo "WARN: Apache static config skipped."
              echo "Enabling HTTP/2 on SSL vhost..."
              sudo bash deploy/enable-http2.sh || echo "WARN: HTTP/2 enable skipped."
            fi
