name: Deploy Darulquran Website

on:
  # Deploy only after CI passes on main (no race with lint/test/build).
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

env:
  DEPLOY_HOST: ${{ vars.DEPLOY_HOST || '157.90.168.216' }}
  DEPLOY_USER: ${{ vars.DEPLOY_USER || 'root' }}
  DEPLOY_PORT: ${{ vars.DEPLOY_PORT || '22' }}
  APP_ROOT: /var/www/darulquran_next
  # Ubuntu 24.04 / appleboy (Go ssh) often negotiates ECDSA — not ED25519.
  # Regenerate: ssh-keyscan -t ecdsa HOST | ssh-keygen -lf - -E sha256
  SSH_FINGERPRINT: SHA256:Aih8r+ZL1sWmCdHYcMpftRwca4HMb03oANjvAgWpUN4

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: production
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Resolve deploy commit
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "ref=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify deploy configuration
        run: |
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "::error::Missing GitHub secret SSH_PRIVATE_KEY."
            echo "Add it at: Settings → Secrets and variables → Actions"
            exit 1
          fi
          if [ -z "${{ env.DEPLOY_HOST }}" ]; then
            echo "::error::DEPLOY_HOST is empty. Set repository variable DEPLOY_HOST or use the default in deploy.yml."
            exit 1
          fi

      - name: Deploy to Hetzner VPS via SSH
        id: ssh
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          port: ${{ env.DEPLOY_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          fingerprint: ${{ env.SSH_FINGERPRINT }}
          timeout: 60s
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd "${{ env.APP_ROOT }}"
            git checkout -- . 2>/dev/null || true
            git fetch origin main
            git reset --hard "${{ steps.meta.outputs.sha }}"
            if [ ! -f deploy/remote-deploy.sh ]; then
              echo "ERROR: deploy/remote-deploy.sh missing at ${{ steps.meta.outputs.sha }}"
              exit 1
            fi
            chmod +x deploy/remote-deploy.sh
            APP_ROOT="${{ env.APP_ROOT }}" DEPLOY_SHA="${{ steps.meta.outputs.sha }}" bash deploy/remote-deploy.sh

      - name: Deployment summary
        if: success()
        run: |
          {
            echo "## Production deploy succeeded"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Host** | \`${{ env.DEPLOY_HOST }}\` |"
            echo "| **Commit** | \`${{ steps.meta.outputs.sha }}\` |"
            echo "| **Branch** | \`${{ steps.meta.outputs.ref }}\` |"
            echo "| **Site** | https://darulquran.pk/ |"
            echo ""
            echo "Triggered by \`${{ github.event_name }}\`."
          } >> "$GITHUB_STEP_SUMMARY"
