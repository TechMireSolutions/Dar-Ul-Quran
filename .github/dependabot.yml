version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    ignore:
      # ESLint 10 breaks eslint-config-next (eslint-plugin-react getFilename API).
      - dependency-name: eslint
        update-types: ["version-update:semver-major"]
    groups:
      sanity:
        patterns:
          - sanity
          - '@sanity/*'
          - next-sanity
      next:
        patterns:
          - next
          - eslint-config-next
          - react
          - react-dom
