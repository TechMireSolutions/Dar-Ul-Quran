version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      sanity:
        patterns:
          - sanity
          - '@sanity/*'
          - next-sanity
      next:
        patterns:
          - next
          - eslint-config-next
          - react
          - react-dom
